esphome:
  name: fridgepower
  friendly_name: FridgePower

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

safe_mode:
  boot_is_good_after: 120s

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

web_server:
  version: 3

external_components:
  - source: github://philippe-a11y/esphome-dometic-cfx
    components: [dometic_cfx_ble]

# Optional: INA226 current sensor on the 12V supply line
i2c:
  sda: GPIO4
  scl: GPIO5
  scan: true
  frequency: 10000 Hz

esp32_ble_tracker:
  scan_parameters:
    interval: 1200ms
    window: 120ms
    active: false
    duration: 30s

ble_client:
  - mac_address: XX:XX:XX:XX:XX:XX  # <-- replace with your CFX5 MAC
    id: cfx_ble_client
    auto_connect: true
    on_connect:
      then:
        - lambda: |-
            esp_ble_set_encryption(id(cfx_ble_client).get_remote_bda(), ESP_BLE_SEC_ENCRYPT_NO_MITM);

dometic_cfx_ble:
  id: dometic_cfx_ble1
  ble_client_id: cfx_ble_client
  product_type: SZ

button:
  - platform: template
    name: "CFX5 Re-Pair"
    icon: mdi:bluetooth-connect
    on_press:
      - lambda: |-
          esp_ble_remove_bond_device(id(cfx_ble_client).get_remote_bda());
      - delay: 500ms
      - lambda: |-
          App.safe_reboot();

sensor:
  # INA226 current sensor (optional, remove if not present)
  - platform: ina226
    address: 0x40
    shunt_resistance: 0.002 ohm
    current:
      name: "Kühlbox Strom"
      id: cfx_strom
      unit_of_measurement: A
    update_interval: 5s

  - platform: template
    name: "Kühlbox Leistung"
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    lambda: |-
      float v = id(cfx_spannung).state;
      float i = id(cfx_strom).state;
      if (!isnan(v) && !isnan(i) && v > 0) {
        return v * i;
      }
      if (!isnan(i)) {
        return 12.0f * i;  // fallback to 12V nominal
      }
      return 0.0f;
    update_interval: 5s

  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: COMPARTMENT_0_MEASURED_TEMPERATURE
    name: "CFX Ist-Temperatur"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: mdi:thermometer

  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: BATTERY_VOLTAGE_LEVEL
    name: "CFX Batteriespannung"
    id: cfx_spannung
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: mdi:car-battery

climate:
  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    name: "CFX Kühlbox"

binary_sensor:
  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: COMPARTMENT_0_DOOR_OPEN
    name: "CFX Tür offen"
    device_class: door
    icon: mdi:door-open

  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: DOOR_ALERT
    name: "CFX Tür-Alarm"
    device_class: problem
    icon: mdi:alarm-light

text_sensor:
  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: FIRMWARE_VERSION
    name: "CFX Firmware"
    icon: mdi:chip

  - platform: dometic_cfx_ble
    dometic_cfx_ble_id: dometic_cfx_ble1
    type: POWER_SOURCE
    name: "CFX Stromquelle"
    icon: mdi:power-plug
